# =============================================================================
# Architecture 2: PySpark Structured Streaming → bronze → silver → dbt gold
# (No Kafka Connect, no MinIO)
# =============================================================================

x-spark-common: &spark-common
  build:
    context: ../shared/spark
    dockerfile: Dockerfile
  environment:
    SPARK_RPC_AUTHENTICATION_ENABLED: "no"
    SPARK_RPC_ENCRYPTION_ENABLED: "no"
    SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
    SPARK_SSL_ENABLED: "no"
    ARCH_DATA_PATH: /data/arch2
  volumes:
    - ../data/arch2:/data/arch2
    - ./jobs:/jobs/arch2
    - ../shared/producer/schemas:/schemas:ro
  networks:
    - lakehouse

services:

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode -- no Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: arch2-kafka
    hostname: kafka
    mem_limit: 1g
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Schema Registry
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: arch2-schema-registry
    hostname: schema-registry
    mem_limit: 512m
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Order Event Producer
  # ---------------------------------------------------------------------------
  producer:
    build:
      context: ../shared/producer
      dockerfile: Dockerfile
    container_name: arch2-producer
    mem_limit: 256m
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_TOPIC: orders.raw
      PRODUCER_INTERVAL_MS: "100"
    restart: on-failure
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Spark Master (+ Thrift Server for dbt)
  # ---------------------------------------------------------------------------
  spark-master:
    <<: *spark-common
    container_name: arch2-spark-master
    hostname: spark-master
    mem_limit: 1g
    depends_on:
      data-init:
        condition: service_completed_successfully
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      START_THRIFT_SERVER: "true"
      ARCH_DATA_PATH: /data/arch2
    ports:
      - "8080:8080"   # Spark UI
      - "7077:7077"   # Spark master
      - "10000:10000" # Thrift Server for dbt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Spark Worker
  # ---------------------------------------------------------------------------
  spark-worker:
    <<: *spark-common
    container_name: arch2-spark-worker
    hostname: spark-worker
    mem_limit: 3g
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      START_THRIFT_SERVER: "false"
      ARCH_DATA_PATH: /data/arch2
    ports:
      - "8082:8081"   # Worker UI (mapped to 8082 to avoid conflict with schema-registry)

  # ---------------------------------------------------------------------------
  # dbt (gold layer) -- only started explicitly via --profile dbt
  # ---------------------------------------------------------------------------
  dbt:
    build:
      context: ../shared/dbt_gold
      dockerfile: Dockerfile
    container_name: arch2-dbt
    mem_limit: 512m
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      DBT_SCHEMA: gold
      ARCH_DATA_PATH: /data/arch2
    volumes:
      - ../data/arch2/gold:/data/arch2/gold
    networks:
      - lakehouse
    profiles:
      - dbt
    restart: "no"

  # ---------------------------------------------------------------------------
  # Data dir init: create /data/arch2 owned by the Spark user (world-writable)
  # ---------------------------------------------------------------------------
  data-init:
    image: busybox:latest
    container_name: arch2-data-init
    user: root
    command: sh -c "mkdir -p /data/arch2/bronze /data/arch2/silver /data/arch2/gold && chmod -R 777 /data"
    volumes:
      - ../data:/data
    restart: "no"

networks:
  lakehouse:
    driver: bridge
